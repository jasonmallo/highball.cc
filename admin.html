<!DOCTYPE html>
<html>
<head>
<title>Admin - CCMARKET</title>

<style>
body {
    margin:0;
    font-family:Arial;
    background:#0b0b10;
    color:white;
    padding:20px;
}

.box {
    max-width:400px;
    margin:auto;
    background:#141420;
    padding:20px;
    border-radius:14px;
}

input, textarea {
    width:100%;
    padding:10px;
    margin:8px 0;
    background:#111;
    border:1px solid #333;
    color:white;
    border-radius:10px;
}

button {
    background:#6a0dad;
    color:white;
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

.hidden { display:none; }
</style>
</head>

<body>

<div class="box" id="loginBox">
    <h2>Admin Login</h2>
    <input id="pass" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<div class="box hidden" id="panel">
    <h2>Admin Panel</h2>

    <input id="title" placeholder="Title">
    <textarea id="desc" placeholder="Description"></textarea>
    <input id="price" placeholder="Price">

    <button onclick="add()">Post Listing</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore,
collection,
addDoc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyATUoBzhoyuzW4G71OB6fIwzBT1peZsFJA",
  authDomain: "ccmarket-33f11.firebaseapp.com",
  projectId: "ccmarket-33f11",
  storageBucket: "ccmarket-33f11.firebasestorage.app",
  messagingSenderId: "933329101447",
  appId: "1:933329101447:web:4c8616745a5aba3baa4e22"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* SIMPLE PASSWORD */
window.login = ()=>{
    const pass = document.getElementById("pass").value;

    if(pass === "admin123"){
        loginBox.classList.add("hidden");
        panel.classList.remove("hidden");
    } else {
        alert("Wrong password");
    }
};

window.add = async ()=>{
    await addDoc(collection(db,"listings"),{
        title:title.value,
        desc:desc.value,
        price:price.value,
        image:"https://via.placeholder.com/300"
    });

    alert("Posted!");
};

</script>

</body>
</html>
