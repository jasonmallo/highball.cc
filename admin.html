<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Panel</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#0a0214;
color:white;
}

header{
padding:14px;
background:#1b0730;
font-weight:700;
}

section{
padding:20px;
}

.box{
background:#140a25;
padding:12px;
margin:10px 0;
border-radius:12px;
}

input, textarea{
width:100%;
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid #333;
background:#140a25;
color:white;
}

button{
padding:8px 10px;
border:0;
border-radius:8px;
cursor:pointer;
font-weight:700;
margin-top:5px;
}

.add{background:#8b5cf6;color:white}
.del{background:#ef4444;color:white}
</style>
</head>

<body>

<header>ADMIN PANEL</header>

<!-- USERS -->
<section>
<h2>Users</h2>
<div id="users"></div>
</section>

<!-- DEPOSITS -->
<section>
<h2>Deposits</h2>
<div id="deps"></div>
</section>

<!-- LISTINGS -->
<section>
<h2>Add Listing (Image Upload)</h2>

<input id="iname" placeholder="Item name">
<input id="iprice" placeholder="Price">

<input type="file" id="iimg">

<button class="add" onclick="addItem()">Add Item</button>

<h3>Current Items</h3>
<div id="items"></div>
</section>

<script>

/* STORAGE */
function getDB(){
return JSON.parse(localStorage.getItem("db") || "{}");
}

function getDeposits(){
return JSON.parse(localStorage.getItem("deposits") || "[]");
}

function getItems(){
return JSON.parse(localStorage.getItem("items") || "[]");
}

/* USERS */
function loadUsers(){
let db = getDB();
let box = document.getElementById("users");
box.innerHTML = "";

for(let u in db){
box.innerHTML += `
<div class="box">
<b>${u}</b><br>
Email: ${db[u].email || "N/A"}<br>
Balance: $${db[u].balance || 0}
</div>`;
}
}

/* DEPOSITS */
function loadDeposits(){
let deposits = getDeposits();
let box = document.getElementById("deps");
box.innerHTML = "";

if(deposits.length === 0){
box.innerHTML = "<p>No deposits</p>";
return;
}

deposits.forEach((d,i)=>{
box.innerHTML += `
<div class="box">
User: ${d.user}<br>
Amount: $${d.amount}<br>
Method: ${d.method}<br>
${d.note ? "<b>"+d.note+"</b><br>" : ""}
Status: ${d.status}<br><br>

<button onclick="approve(${i})" style="background:green;color:white">Accept</button>
<button onclick="deny(${i})" style="background:red;color:white">Deny</button>
</div>`;
});
}

/* APPROVE / DENY */
function approve(i){
let db = getDB();
let deposits = getDeposits();

let d = deposits[i];

if(!db[d.user]) db[d.user] = {balance:0};

db[d.user].balance += Number(d.amount);

deposits.splice(i,1);

localStorage.setItem("db",JSON.stringify(db));
localStorage.setItem("deposits",JSON.stringify(deposits));

loadUsers();
loadDeposits();
}

function deny(i){
let deposits = getDeposits();

deposits.splice(i,1);

localStorage.setItem("deposits",JSON.stringify(deposits));

loadDeposits();
}

/* IMAGE → BASE64 */
function toBase64(file){
return new Promise((res)=>{
let reader = new FileReader();
reader.onload = () => res(reader.result);
reader.readAsDataURL(file);
});
}

/* ADD ITEM WITH IMAGE */
async function addItem(){

let name = document.getElementById("iname").value;
let price = document.getElementById("iprice").value;
let file = document.getElementById("iimg").files[0];

if(!name || !price){
alert("Fill name + price");
return;
}

let items = getItems();
let img = "";

if(file){
img = await toBase64(file);
}

items.push({
name,
price,
image: img
});

localStorage.setItem("items",JSON.stringify(items));

document.getElementById("iname").value="";
document.getElementById("iprice").value="";
document.getElementById("iimg").value="";

loadItems();
}

/* RENDER ITEMS */
function loadItems(){
let items = getItems();
let box = document.getElementById("items");
box.innerHTML = "";

if(items.length === 0){
box.innerHTML = "<p>No items</p>";
return;
}

items.forEach((x,i)=>{
box.innerHTML += `
<div class="box">
<img src="${x.image}" style="width:100%;border-radius:10px"><br>
<b>${x.name}</b> - $${x.price}<br>

<button class="del" onclick="deleteItem(${i})">Delete</button>
</div>`;
});
}

/* DELETE ITEM */
function deleteItem(i){
let items = getItems();
items.splice(i,1);
localStorage.setItem("items",JSON.stringify(items));
loadItems();
}

/* INIT */
loadUsers();
loadDeposits();
loadItems();

setInterval(()=>{
loadDeposits();
loadUsers();
},2000);

</script>

</body>
</html>
