<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Panel</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#0a0214;
color:white;
}

header{
padding:14px;
background:#1b0730;
font-weight:700;
}

section{
padding:20px;
}

.box{
background:#140a25;
padding:12px;
margin:10px 0;
border-radius:12px;
}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid #333;
background:#140a25;
color:white;
}

button{
padding:8px 10px;
border:0;
border-radius:8px;
cursor:pointer;
font-weight:700;
margin-top:5px;
}

.add{background:#8b5cf6;color:white}
.del{background:#ef4444;color:white}
.accept{background:#22c55e;color:white}
.deny{background:#ef4444;color:white}
</style>
</head>

<body>

<header>ADMIN PANEL</header>

<!-- USERS -->
<section>
<h2>Users</h2>
<div id="users"></div>
</section>

<!-- DEPOSITS -->
<section>
<h2>Deposits</h2>
<div id="deps"></div>
</section>

<!-- LISTINGS -->
<section>
<h2>Shop Listings</h2>

<input id="iname" placeholder="Item name">
<input id="iprice" placeholder="Price">
<input id="iimg" placeholder="Image URL">

<button class="add" onclick="addItem()">Add Item</button>

<div id="items"></div>
</section>

<script>

/* STORAGE */
function getDB(){
return JSON.parse(localStorage.getItem("db") || "{}");
}

function getDeposits(){
return JSON.parse(localStorage.getItem("deposits") || "[]");
}

function getItems(){
return JSON.parse(localStorage.getItem("items") || "[]");
}

/* USERS */
function loadUsers(){
let db = getDB();
let box = document.getElementById("users");
box.innerHTML = "";

for(let u in db){
box.innerHTML += `
<div class="box">
<b>${u}</b><br>
Email: ${db[u].email || "N/A"}<br>
Balance: $${db[u].balance || 0}
</div>`;
}
}

/* DEPOSITS */
function loadDeposits(){
let deposits = getDeposits();
let box = document.getElementById("deps");
box.innerHTML = "";

if(deposits.length === 0){
box.innerHTML = "<p>No deposits</p>";
return;
}

deposits.forEach((d,i)=>{
box.innerHTML += `
<div class="box">
User: ${d.user}<br>
Amount: $${d.amount}<br>
Method: ${d.method}<br>
Info: ${d.info}<br>
${d.note ? "<b>"+d.note+"</b><br>" : ""}
Status: ${d.status}<br><br>

<button class="accept" onclick="approve(${i})">Accept</button>
