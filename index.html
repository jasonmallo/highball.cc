<!DOCTYPE html>
<html>
<head>
<title>CCMARKET.FO</title>

<style>
body { margin:0; font-family:Arial; background:#0b0b10; color:white; }

header {
    background: linear-gradient(90deg,#6a0dad,#a855f7);
    padding:16px;
    text-align:center;
    font-weight:bold;
}

.nav {
    display:flex;
    justify-content:center;
    gap:10px;
    padding:10px;
    background:#111;
}

.nav button {
    background:#1b1b25;
    border:none;
    color:white;
    padding:10px;
    border-radius:10px;
    cursor:pointer;
}

.page { display:none; padding:20px; }
.page.active { display:block; }

.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:16px;
}

.card {
    background:#151521;
    border-radius:14px;
    overflow:hidden;
    cursor:pointer;
}

.card img {
    width:100%;
    height:160px;
    object-fit:cover;
}

.card-body { padding:12px; }

.price { color:#a855f7; font-weight:bold; }

/* MODAL */
.modal {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    display:none;
    align-items:center;
    justify-content:center;
}

.modal.show { display:flex; }

.box {
    background:#141420;
    padding:20px;
    border-radius:14px;
    width:300px;
}
</style>
</head>

<body>

<header>CCMARKET.FO</header>

<div class="nav">
    <button onclick="show('home')">Info</button>
    <button onclick="show('shop')">Shop</button>
</div>

<div id="home" class="page active">
    <h2>Marketplace Info</h2>
    <p>Buy and sell digital items safely.</p>
</div>

<div id="shop" class="page">
    <div class="grid" id="grid"></div>
</div>

<div class="modal" id="modal">
    <div class="box">
        <h3 id="t"></h3>
        <p id="d"></p>
        <p id="p"></p>
        <button onclick="closeM()">Close</button>
    </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import {
getFirestore,
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyATUoBzhoyuzW4G71OB6fIwzBT1peZsFJA",
  authDomain: "ccmarket-33f11.firebaseapp.com",
  projectId: "ccmarket-33f11",
  storageBucket: "ccmarket-33f11.firebasestorage.app",
  messagingSenderId: "933329101447",
  appId: "1:933329101447:web:4c8616745a5aba3baa4e22"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.show = (id)=>{
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(id).classList.add("active");
};

window.closeM = ()=>{
    modal.classList.remove("show");
};

async function load(){
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    const snap = await getDocs(collection(db,"listings"));

    snap.forEach(d=>{
        const i = d.data();

        const div = document.createElement("div");
        div.className="card";

        div.innerHTML = `
            <img src="${i.image}">
            <div class="card-body">
                <h3>${i.title}</h3>
                <p>${i.desc}</p>
                <p class="price">${i.price}</p>
            </div>
        `;

        div.onclick = ()=>{
            modal.classList.add("show");
            t.innerText=i.title;
            d.innerText=i.desc;
            p.innerText=i.price;
        };

        grid.appendChild(div);
    });
}

load();

</script>

</body>
</html>
