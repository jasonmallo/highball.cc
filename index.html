<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CCMARKET Admin</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0b10;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD */
.box {
    width: 400px;
    background: #141420;
    padding: 20px;
    border-radius: 14px;
    box-shadow: 0 0 20px rgba(106,13,173,0.3);
}

/* INPUTS */
input, textarea {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 10px;
    border: 1px solid #333;
    background: #111;
    color: white;
}

/* BUTTON */
button {
    width: 100%;
    background: #6a0dad;
    color: white;
    padding: 10px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    margin-top: 8px;
}

button:hover {
    background: #8b3dff;
}

/* FILE UPLOAD */
.file {
    padding: 10px;
    background: #111;
    border: 1px solid #333;
    border-radius: 10px;
    margin-top: 8px;
    width: 100%;
}

/* HIDDEN */
.hidden {
    display: none;
}

/* TITLE */
h2 {
    text-align: center;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="box" id="loginBox">
    <h2>Admin Login</h2>

    <input id="password" type="password" placeholder="Enter password">
    <button onclick="login()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div class="box hidden" id="adminPanel">
    <h2>Upload Listing</h2>

    <input id="title" placeholder="Title">
    <textarea id="desc" placeholder="Description"></textarea>
    <input id="price" placeholder="Price">

    <!-- IMAGE UPLOAD AREA -->
    <input type="file" id="image" class="file" accept="image/*">

    <button onclick="upload()">Post Listing</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { 
    getFirestore, 
    collection, 
    addDoc 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

import { 
    getStorage, 
    ref, 
    uploadBytes, 
    getDownloadURL 
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

/* 🔥 YOUR FIREBASE */
const firebaseConfig = {
  apiKey: "AIzaSyATUoBzhoyuzW4G71OB6fIwzBT1peZsFJA",
  authDomain: "ccmarket-33f11.firebaseapp.com",
  projectId: "ccmarket-33f11",
  storageBucket: "ccmarket-33f11.firebasestorage.app",
  messagingSenderId: "933329101447",
  appId: "1:933329101447:web:4c8616745a5aba3baa4e22"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

/* 🔐 LOGIN */
window.login = ()=>{
    const pass = document.getElementById("password").value;

    if(pass === "admin123"){
        document.getElementById("loginBox").classList.add("hidden");
        document.getElementById("adminPanel").classList.remove("hidden");
    } else {
        alert("Wrong password");
    }
};

/* 📦 UPLOAD LISTING */
window.upload = async ()=>{

    const title = document.getElementById("title").value;
    const desc = document.getElementById("desc").value;
    const price = document.getElementById("price").value;
    const file = document.getElementById("image").files[0];

    if(!title || !price) return alert("Fill required fields");

    let imageUrl = "";

    // If image exists → upload to Firebase Storage
    if(file){

        const imageRef = ref(storage, "images/" + Date.now() + file.name);

        await uploadBytes(imageRef, file);

        imageUrl = await getDownloadURL(imageRef);
    }

    await addDoc(collection(db,"listings"),{
        title,
        desc,
        price,
        image: imageUrl || "https://via.placeholder.com/300"
    });

    alert("Listing posted!");
};

</script>

</body>
</html>
