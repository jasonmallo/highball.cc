<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shop</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#0a0214;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
background:#1b0730;
position:sticky;
top:0;
}

button{
cursor:pointer;
}

nav button{
background:none;
border:0;
color:#ccc;
margin:0 6px;
font-weight:700;
}

.login{
background:#8b5cf6;
color:white;
border:0;
padding:6px 10px;
border-radius:8px;
font-weight:700;
}

section{
display:none;
padding:20px;
}

section.active{
display:block;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
gap:15px;
}

.card{
background:#140a25;
padding:12px;
border-radius:12px;
}

img{
width:100%;
height:140px;
object-fit:cover;
border-radius:10px;
background:#222;
}

.buy{
width:100%;
padding:10px;
margin-top:8px;
border:0;
border-radius:10px;
background:#22c55e;
color:white;
font-weight:700;
}

#status{
margin-top:10px;
white-space:pre-line;
}
</style>
</head>

<body>

<header>
<div>ccmarket</div>

<nav>
<button onclick="show('shop')">Shop</button>
<button onclick="show('deposit')">Deposit</button>
</nav>

<div>
<span id="userBox"></span>
<button class="login" onclick="login()">Login</button>
</div>
</header>

<!-- SHOP -->
<section id="shop" class="active">
<h2>Shop</h2>
<div id="items" class="grid"></div>
</section>

<!-- DEPOSIT -->
<section id="deposit">
<h2>Balance: $<span id="bal">0</span></h2>
<div id="status"></div>
</section>

<script>

/* USER */
let user = localStorage.getItem("currentUser");

/* FIX: everyone gets session so shop works */
if(!user){
user = "guest_" + Math.floor(Math.random()*9999);
localStorage.setItem("currentUser", user);
}

/* DATA */
let db = JSON.parse(localStorage.getItem("db") || "{}");
let items = JSON.parse(localStorage.getItem("items") || "[]");
let orders = JSON.parse(localStorage.getItem("orders") || "[]");

/* INIT USER */
if(!db[user]){
db[user] = {balance:0};
localStorage.setItem("db", JSON.stringify(db));
}

/* UI */
document.getElementById("userBox").innerText = user;

/* NAV */
function show(id){
document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");
updateBalance();
}

/* LOGIN BUTTON */
function login(){
window.location.href = "auth.html";
}

/* RENDER SHOP */
function render(){
let box = document.getElementById("items");
box.innerHTML = "";

if(items.length === 0){
box.innerHTML = "<p style='opacity:0.6'>No items available</p>";
return;
}

items.forEach((x,i)=>{
box.innerHTML += `
<div class="card">
<img src="${x.image || 'https://via.placeholder.com/300'}">
<h3>${x.name}</h3>
<p>$${x.price}</p>

<button class="buy" onclick="buy(${i})">BUY</button>
</div>`;
});
}

/* BUY SYSTEM */
function buy(i){

if(!db[user]){
alert("User error");
return;
}

let item = items[i];
let price = Number(item.price);

if(db[user].balance < price){
alert("Not enough balance");
return;
}

/* subtract balance */
db[user].balance -= price;

/* create order */
orders.push({
user,
item:item.name,
price,
status:"paid"
});

/* save */
localStorage.setItem("db", JSON.stringify(db));
localStorage.setItem("orders", JSON.stringify(orders));

alert("Purchase successful!");

updateBalance();
}

/* BALANCE */
function updateBalance(){
document.getElementById("bal").innerText = db[user].balance || 0;
}

/* INIT */
render();
updateBalance();

</script>

</body>
</html>
