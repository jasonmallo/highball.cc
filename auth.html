<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Auth</title>

<style>
body{
margin:0;
font-family:system-ui;
background:radial-gradient(circle at top,#1b0730,#0a0214);
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.box{
width:340px;
padding:20px;
border-radius:16px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:10px;
border:1px solid #333;
background:#140a25;
color:white;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:0;
border-radius:10px;
background:#8b5cf6;
color:white;
font-weight:700;
cursor:pointer;
}

.switch{
text-align:center;
margin-top:10px;
color:#bbb;
cursor:pointer;
font-size:13px;
}
</style>
</head>

<body>

<div class="box">
<h2 id="title">Login</h2>

<input id="email" placeholder="Email">
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<button onclick="auth()">Continue</button>

<div class="switch" onclick="toggle()">
No account? Sign up
</div>
</div>

<script>
let mode="login";

function toggle(){
mode = mode==="login"?"signup":"login";
document.getElementById("title").innerText =
mode==="login"?"Login":"Sign Up";
}

function auth(){
let email=document.getElementById("email").value;
let user=document.getElementById("user").value;
let pass=document.getElementById("pass").value;

if(!email||!user||!pass) return alert("Fill all fields");

let db=JSON.parse(localStorage.getItem("db")||"{}");

if(mode==="signup"){
if(db[user]) return alert("User exists");

db[user]={email,pass,balance:0};
localStorage.setItem("db",JSON.stringify(db));

alert("Account created");
toggle();
return;
}

if(db[user]?.pass!==pass){
return alert("Wrong login");
}

localStorage.setItem("currentUser",user);
window.location.href="shop.html";
}
</script>

</body>
</html>
